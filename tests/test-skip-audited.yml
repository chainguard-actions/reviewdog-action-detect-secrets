name: Test detect-secrets skip audited secrets
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          github_token: ${{ github.token }}
          reporter: local
          filter_mode: nofilter
          fail_level: none
          level: error
          skip_audited: "true"
          detect_secrets_flags: --force-use-all-plugins
          workdir: tests/fixtures/clean
      - name: Assert action completed with skip_audited
        run: |
          echo "detect-secrets skip_audited action completed"
          echo "PASS"
